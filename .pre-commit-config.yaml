# Pre-commit hooks configuration for code quality enforcement
# Ensures consistent code standards across the development team
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Removes trailing whitespace
      - id: trailing-whitespace
      # Ensures files end with a newline
      - id: end-of-file-fixer
      # Checks YAML file syntax
      - id: check-yaml
        args: [--unsafe]
      # Verifies large files aren't committed
      - id: check-added-large-files
        args: ['--maxkb=500']
      # Prevents committing sensitive data patterns
      - id: detect-private-key
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]

  # Black code formatter - uncompromising code formatting
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.11
        args: [--line-length=100, --target-version=py311]

  # isort - automatic import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]

  # Ruff - extremely fast Python linter (replaces flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.11
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  # mypy - static type checker
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-redis
          - types-PyYAML
          - pydantic
        args: [--strict, --ignore-missing-imports]

  # bandit - security linting for Python
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r, src/]
        additional_dependencies: ['.[toml]']

  # Checkov - IaC security scanning
  - repo: https://github.com/bridgecrewio/checkov.git
    rev: 3.1.63
    hooks:
      - id: checkov
        args: [--soft-fail]
        files: '\.(tf|yml|yaml)$'

  # Hadolint - Dockerfile linter
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint
        args: [--config, .hadolint.yaml]
