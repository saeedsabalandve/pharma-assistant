# ============================================================================
# Docker Compose - Local Development Environment
# Provides all required services for local development and testing
# ============================================================================

version: '3.8'

services:
  # -------------------------------------------------------------------------
  # Main Application
  # -------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder  # Use builder stage for development
    container_name: pharma-assistant-app
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=pharma_assistant
      - POSTGRES_USER=pharma_user
      - POSTGRES_PASSWORD=dev_password_123
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB=pharma_assistant
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_ENDPOINT_URL=http://localstack:4566
    volumes:
      - .:/app
      - ~/.aws:/home/pharma/.aws:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks:
      - pharma-network
    command: ["uvicorn", "src.main:app", "--reload", "--host", "0.0.0.0", "--port", "8000"]

  # -------------------------------------------------------------------------
  # PostgreSQL (Primary relational database)
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: pharma-postgres
    environment:
      POSTGRES_DB: pharma_assistant
      POSTGRES_USER: pharma_user
      POSTGRES_PASSWORD: dev_password_123
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharma_user -d pharma_assistant"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pharma-network

  # -------------------------------------------------------------------------
  # MongoDB (Document store for unstructured data)
  # -------------------------------------------------------------------------
  mongodb:
    image: mongo:7-jammy
    container_name: pharma-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_password
      MONGO_INITDB_DATABASE: pharma_assistant
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongodb.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pharma-network

  # -------------------------------------------------------------------------
  # Redis (Caching & Session Store)
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pharma-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pharma-network

  # -------------------------------------------------------------------------
  # OpenSearch (Full-text search engine)
  # -------------------------------------------------------------------------
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: pharma-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_PERFORMANCE_ANALYZER_AGENT_CLI=true
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\|yellow'"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - pharma-network

  # -------------------------------------------------------------------------
  # LocalStack (AWS Service Emulator for local development)
  # -------------------------------------------------------------------------
  localstack:
    image: localstack/localstack:3.0
    container_name: pharma-localstack
    environment:
      - SERVICES=bedrock,comprehendmedical,sqs,sns,s3,kms,secretsmanager,cloudwatch
      - DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
    ports:
      - "4566:4566"  # LocalStack Gateway
      - "4510-4559:4510-4559"  # External services port range
    volumes:
      - localstack_data:/tmp/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - pharma-network

  # -------------------------------------------------------------------------
  # pgAdmin (Database management UI - optional)
  # -------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pharma-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pharma.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - pharma-network
    profiles:
      - tools  # Only start with: docker-compose --profile tools up

  # -------------------------------------------------------------------------
  # Mongo Express (MongoDB management UI - optional)
  # -------------------------------------------------------------------------
  mongo-express:
    image: mongo-express:latest
    container_name: pharma-mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin_password
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin_password@mongodb:27017/
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - pharma-network
    profiles:
      - tools

# ---------------------------------------------------------------------------
# Persistent volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    name: pharma_postgres_data
  mongodb_data:
    name: pharma_mongodb_data
  redis_data:
    name: pharma_redis_data
  opensearch_data:
    name: pharma_opensearch_data
  localstack_data:
    name: pharma_localstack_data
  pgadmin_data:
    name: pharma_pgadmin_data

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
networks:
  pharma-network:
    name: pharma_network
    driver: bridge
